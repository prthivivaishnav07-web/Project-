<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnav Shops</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="app-container" style="padding: 20px; max-width: 500px; margin: auto; font-family: Arial, sans-serif; transition: all 0.3s ease;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">🏬 Vaishnav Shops</h2>
            <div>
                <label for="theme-select" style="font-size: 12px; font-weight: bold; display: block; margin-bottom: 2px;">Theme:</label>
                <select id="theme-select" onchange="changeTheme()" style="padding: 5px; border-radius: 4px; cursor: pointer;">
                    <option value="white">White ⚪</option>
                    <option value="grey">Grey 🔘</option>
                    <option value="black">Black ⚫</option>
                    <option value="blue">Blue 🔵</option>
                </select>
            </div>
        </div>

        <div class="balance-box" id="balance-card" style="padding: 20px; background: #d4efdf; color: #145a32; border-radius: 8px; text-align: center; margin-bottom: 20px; transition: 0.3s;">
            <h3 style="margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 0.5px;">Available Wallet Balance</h3>
            <div class="balance" style="font-size: 32px; font-weight: bold; margin-top: 5px;">$<span id="balance">10000.00</span></div>
        </div>

        <form id="tracker-form" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="hidden" id="edit-id" value="">
            
            <div>
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Item Description:</label>
                <input type="text" id="desc" placeholder="e.g., Apparel, Groceries, Electronics" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" required>
            </div>
            
            <div>
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Item Price / Value:</label>
                <input type="text" id="amount" placeholder="e.g., 2000 or 4*500" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;" required>
            </div>
            
            <div>
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Transaction Category:</label>
                <select id="category" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; cursor: pointer;">
                    <option value="Clothes">Clothes 👗 (Purple Tag)</option>
                    <option value="Food">Food 🍔 (Orange Tag)</option>
                    <option value="Electronics">Electronics ⚡ (Blue Tag)</option>
                    <option value="Salary">Deposit Cash 💰 (Green Tag)</option>
                    <option value="General">Other ⚪ (Gray Tag)</option>
                </select>
            </div>
            
            <button type="submit" id="form-submit-btn" style="background: #e74c3c; color: white; width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;">Purchase Item (Subtract)</button>
        </form>

        <button onclick="resetData()" style="margin-top: 20px; background: #7f8c8d; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold;">Reset Inventory & Wallet</button>

        <h3 style="margin-top: 25px; border-bottom: 2px solid #eee; padding-bottom: 8px;">Verified Expense Log</h3>
        <ul id="list" class="list" style="list-style: none; padding: 0; margin: 0;"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
