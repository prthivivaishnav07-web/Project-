<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEGOZI VAISHNAV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; padding: 20px 10px; font-family: 'Segoe UI', Arial, sans-serif; transition: background 0.3s ease; position: relative; overflow-x: hidden;">
    
    <div class="container" id="app-container" style="padding: 24px; max-width: 440px; margin: auto; border-radius: 12px; box-sizing: border-box; transition: all 0.3s ease;">
        
        <!-- Header Section -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 10px;">
            <h2 style="margin: 0; font-size: 24px; font-weight: 800; letter-spacing: 0.5px;">🏬 NEGOZI VAISHNAV</h2>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="text-align: right; width: 85px;">
                    <select id="theme-select" onchange="changeTheme()" style="padding: 6px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%;">
                        <option value="white">WHITE ⚪</option>
                        <option value="grey">GREY 🔘</option>
                        <option value="black">BLACK ⚫</option>
                        <option value="blue">BLUE 🔵</option>
                    </select>
                </div>
                <button type="button" onclick="toggleSidebar(true)" style="background: none; border: none; font-size: 24px; cursor: pointer; color: inherit; padding: 5px;">☰</button>
            </div>
        </div>

        <!-- Wallet Balance Display -->
        <div class="balance-box" id="balance-card" style="padding: 22px; background: #d4efdf; color: #145a32; border-radius: 10px; text-align: center; margin-bottom: 25px;">
            <h3 style="margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">AVAILABLE WALLET BALANCE</h3>
            <div class="balance" style="font-size: 34px; font-weight: 700; margin-top: 6px; letter-spacing: -0.5px;">$<span id="balance">10000.00</span></div>
        </div>

        <!-- Inputs Form -->
        <form id="tracker-form" style="display: flex; flex-direction: column; gap: 18px;">
            <input type="hidden" id="edit-id" value="">
            
            <div>
                <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 6px;">ITEM</label>
                <input type="text" id="desc" oninput="autoUpdatePrice()" placeholder="e.g., Pizza, Burger" style="width: 100%; padding: 11px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box;" required>
            </div>
            
            <!-- Side-by-Side Fields for Price and Size -->
            <div style="display: flex; gap: 12px; width: 100%; box-sizing: border-box;">
                <div style="flex: 1;">
                    <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 6px;">PRICE</label>
                    <input type="text" id="amount" placeholder="Price" style="width: 100%; padding: 11px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box;" required>
                </div>
                <div style="width: 140px;">
                    <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 6px;">SIZE</label>
                    <select id="item-size" onchange="autoUpdatePrice()" style="width: 100%; padding: 11px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; background-color: #fff; font-weight: 600; cursor: pointer;">
                        <option value="SMALL">SMALL 🟢</option>
                        <option value="MEDIUM" selected>MEDIUM 🟡</option>
                        <option value="LARGE">LARGE 🔴</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label style="font-weight: 700; font-size: 13px; display: block; margin-bottom: 6px;">TYPE</label>
                <select id="category" style="width: 100%; padding: 11px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; background-color: #fff; font-weight: 600;">
                    <option value="Food">FOOD 🍔</option>
                    <option value="Clothes">CLOTHES 👑</option>
                    <option value="Electronics">ELECTRONICS ⚡</option>
                    <option value="Salary">DEPOSIT CASH 💰</option>
                    <option value="General">OTHER ⚪</option>
                </select>
            </div>
            
            <button type="submit" id="form-submit-btn" style="background: #e74c3c; width: 100%; height: 48px; border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s; margin-top: 5px;"></button>
        </form>

        <button type="button" onclick="resetData()" style="margin-top: 20px; background: #7f8c8d; color: white; border: none; padding: 11px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; letter-spacing: 1px;">RESET</button>
    </div>

    <!-- Slide-out Right Sidebar for History -->
    <div id="history-sidebar" style="position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: #fff; box-shadow: -4px 0 15px rgba(0,0,0,0.2); transition: right 0.3s ease; z-index: 9999; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 12px;">
            <h3 id="sidebar-title" style="margin: 0; font-size: 15px; font-weight: 700; color: #333;">HISTORY TRANSACTION</h3>
            <button type="button" onclick="toggleSidebar(false)" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #999;">✕</button>
        </div>

        <!-- Weekly Expense Calendar Heat Map Container -->
        <div style="margin-bottom: 18px; padding: 10px; background: rgba(0,0,0,0.03); border-radius: 8px;">
            <div style="font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8;">Weekly Heat Map</div>
            <div id="heatmap-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center;"></div>
        </div>

        <div style="flex: 1; overflow-y: auto;">
            <ul id="list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
