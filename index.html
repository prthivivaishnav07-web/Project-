<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCIAL TIMELINE</title>
</head>
<body id="body-bg" style="margin: 0; padding: 20px 10px; font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f1115; color: #e2e8f0;">
    
    <div class="container" id="app-container" style="max-width: 480px; margin: auto; padding: 20px; border-radius: 16px; box-sizing: border-box; background: #171c24; border: 1px solid #232d3d; box-shadow: 0 8px 24px rgba(0,0,0,0.4);">
        
        <div style="background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 16px; border: 1px solid #334155;">
            <label style="font-weight: 700; font-size: 10px; display: block; margin-bottom: 8px; color: #94a3b8; letter-spacing: 0.5px; text-transform: uppercase;">Switch Wallet Profile</label>
            <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                <button type="button" class="user-btn" onclick="switchUser('Vaishnav')" id="btn-Vaishnav" style="flex: 1; padding: 8px; border-radius: 6px; border: none; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase;">Vaishnav</button>
                <button type="button" class="user-btn" onclick="switchUser('Mom')" id="btn-Mom" style="flex: 1; padding: 8px; border-radius: 6px; border: none; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase;">Mom</button>
                <button type="button" class="user-btn" onclick="switchUser('Dad')" id="btn-Dad" style="flex: 1; padding: 8px; border-radius: 6px; border: none; font-weight: 700; font-size: 11px; cursor: pointer; text-transform: uppercase;">Dad</button>
            </div>
            <div id="user-greeting" style="font-size: 13px; font-weight: 600; color: #34d399; text-align: center; margin-top: 4px;">Welcome back!</div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 14px; border-bottom: 1px solid #232d3d;">
            <h2 style="margin: 0; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; color: #ffffff; text-transform: uppercase;"><span id="title-user-tag">Wallet</span> TIMELINE</h2>
            <div style="display: flex; gap: 8px;">
                <button type="button" onclick="toggleSidebar(true)" style="background: #3b82f6; color: white; border: none; font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 6px; cursor: pointer;">LOGS</button>
                <button type="button" onclick="resetData()" style="background: #ef4444; color: white; border: none; font-size: 11px; font-weight: 600; padding: 6px 12px; border-radius: 6px; cursor: pointer;">RESET</button>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px;">
            <div style="grid-column: span 2; background: #10b981; color: white; padding: 14px; border-radius: 10px; text-align: center;">
                <div style="font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.9;"><span id="metric-user-tag">User</span> NET WORTH</div>
                <div style="font-size: 26px; font-weight: 700; margin-top: 2px;">₹<span id="net-worth">10000.00</span></div>
            </div>
            <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size: 10px; font-weight: 600; color: #60a5fa; text-transform: uppercase;">Savings Rate</div>
                <div id="savings-rate" style="font-size: 15px; font-weight: 700; margin-top: 2px; color: #60a5fa;">100%</div>
            </div>
            <div style="background: rgba(244, 63, 94, 0.1); border: 1px solid #f43f5e; padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size: 10px; font-weight: 600; color: #fb7185; text-transform: uppercase;">Daily Burn Rate</div>
                <div id="burn-rate" style="font-size: 15px; font-weight: 700; margin-top: 2px; color: #fb7185;">₹0.00/day</div>
            </div>
        </div>

        <form id="tracker-form" style="display: flex; flex-direction: column; gap: 14px; margin-top: 20px;">
            <div>
                <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">MAIN MANAGEMENT TYPE</label>
                <select id="main-category" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; background: #1e293b; color: white; font-weight: 600;"></select>
            </div>

            <div id="sub-category-container">
                <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">ITEM TYPE</label>
                <select id="sub-category" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; background: #1e293b; color: white; font-weight: 600;"></select>
            </div>

            <div id="brand-container">
                <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">BRAND / SPECIFIC PRODUCT</label>
                <select id="item-brand" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; background: #1e293b; color: white; font-weight: 600;"></select>
            </div>

            <div id="model-container">
                <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">MODEL VARIANT / SIZE</label>
                <select id="item-model" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; background: #1e293b; color: white; font-weight: 600;"></select>
            </div>

            <div id="custom-text-container" style="display: none;">
                <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">CUSTOM DESCRIPTION / NOTES</label>
                <input type="text" id="custom-desc" placeholder="e.g., Cash Bonus, Allowance" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; box-sizing: border-box; background: #1e293b; color: white;">
            </div>
            
            <div style="display: flex; gap: 10px; width: 100%;">
                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">PRICE / VALUE (₹)</label>
                    <input type="number" step="any" min="0" id="amount" placeholder="Price" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; box-sizing: border-box; background: #1e293b; color: white;" required>
                </div>
                <div style="width: 150px;">
                    <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">ACTION TYPE</label>
                    <select id="category" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; box-sizing: border-box; background: #1e293b; color: white; font-weight: 600;">
                        <option value="Expense" selected>EXPENSE</option>
                        <option value="Salary">DEPOSIT CASH</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px; width: 100%;">
                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">TIMELINE MONTH</label>
                    <select id="timeline-month" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; background: #1e293b; color: white; font-weight: 600;">
                        <option value="0">January (Jan)</option>
                        <option value="1">February (Feb)</option>
                        <option value="2">March (Mar)</option>
                        <option value="3">April (Apr)</option>
                        <option value="4">May (May)</option>
                        <option value="5">June (Jun)</option>
                        <option value="6" selected>July (Jul)</option>
                        <option value="7">August (Aug)</option>
                        <option value="8">September (Sep)</option>
                        <option value="9">October (Oct)</option>
                        <option value="10">November (Nov)</option>
                        <option value="11">December (Dec)</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 11px; display: block; margin-bottom: 5px; color: #94a3b8;">TIME PERIOD</label>
                    <select id="timeline-period" style="width: 100%; padding: 10px; border: 1px solid #334155; border-radius: 8px; font-size: 13px; background: #1e293b; color: white; font-weight: 600;">
                        <option value="Morning">Morning</option>
                        <option value="Afternoon">Afternoon</option>
                        <option value="Evening">Evening</option>
                        <option value="Night">Night</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" id="form-submit-btn" style="background: #3b82f6; width: 100%; height: 44px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: 700; font-size: 13px; text-transform: uppercase;">TRANSACTION</button>
        </form>

        <div style="margin-top: 24px; padding: 14px; background: #1e293b; border-radius: 10px; border: 1px solid #334155;">
            <div style="font-size: 11px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; text-align: center; color: #ffffff;">12-Month Contribution Map</div>
            <div id="year-contribution-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center;"></div>
        </div>

        <div style="margin-top: 16px; padding: 14px; background: #1e293b; border-radius: 10px; border: 1px solid #334155;">
            <div style="font-size: 11px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; text-align: center; color: #ffffff;">Money Burn Heat Map</div>
            <div id="diurnal-heatmap-grid" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>

    <div id="history-sidebar" style="position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: #171c24; box-shadow: -4px 0 20px rgba(0,0,0,0.6); transition: right 0.25s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; border-left: 1px solid #232d3d;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 12px;">
            <h3 style="margin: 0; font-size: 13px; font-weight: 700; color: #ffffff; letter-spacing: 0.3px;">FAMILY COMPREHENSIVE LOGS</h3>
            <button type="button" onclick="toggleSidebar(false)" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #94a3b8;">✕</button>
        </div>
        <div style="flex: 1; overflow-y: auto;">
            <ul id="list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                                </html>
