<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEGOZI VAISHNAV - FINANCIAL TIMELINE</title>
</head>
<body id="body-bg" style="margin: 0; padding: 15px 10px; font-family: 'Segoe UI', Arial, sans-serif; background-color: #f5f6fa; color: #333; transition: background 0.25s ease;">
    
    <div class="container" id="app-container" style="max-width: 500px; margin: auto; padding: 20px; border-radius: 14px; box-sizing: border-box; background: #ffffff; border: 1px solid #dcdde1; box-shadow: 0 4px 10px rgba(0,0,0,0.04); transition: all 0.25s ease;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 14px; border-bottom: 2px solid #e1b12c;">
            <h2 style="margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 0.3px;">🏬 FINANCIAL TIMELINE</h2>
            <div style="display: flex; align-items: center; gap: 6px;">
                <select id="theme-select" style="padding: 6px 4px; border-radius: 6px; border: 1px solid #ccc; font-size: 10px; font-weight: 700; cursor: pointer; background: #fff; color: #333;">
                    <option value="white">WHITE ⚪</option>
                    <option value="grey">GREY 🔘</option>
                    <option value="black">BLACK ⚫</option>
                    <option value="pink">PINK 🌸</option>
                    <option value="green">GREEN 🟢</option>
                    <option value="purple">PURPLE 🔮</option>
                    <option value="brown">BROWN 🪵</option>
                </select>
                <button type="button" onclick="toggleSidebar(true)" style="background: #3498db; color: white; border: none; font-size: 11px; font-weight:700; padding: 6px 10px; border-radius: 6px; cursor: pointer;">LOGS 🧾</button>
                <button type="button" onclick="resetData()" style="background: #7f8c8d; color: white; border: none; font-size: 11px; font-weight:700; padding: 6px 10px; border-radius: 6px; cursor: pointer;">RESET 🔄</button>
            </div>
        </div>

        <div id="metrics-board" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; padding-bottom: 16px; border-bottom: 1px solid #dcdde1;">
            <div style="grid-column: span 2; background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; padding: 14px; border-radius: 10px; text-align: center; box-shadow: 0 3px 8px rgba(46,204,113,0.15);">
                <div style="font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; opacity: 0.95;">NET WORTH (TOTAL WALLET)</div>
                <div style="font-size: 28px; font-weight: 800; margin-top: 2px;">$<span id="net-worth">10000.00</span></div>
            </div>

            <div style="background: rgba(52, 152, 219, 0.08); border: 1px solid rgba(52, 152, 219, 0.2); padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size: 10px; font-weight: 700; color: #2980b9; text-transform: uppercase;">Savings Rate</div>
                <div id="savings-rate" style="font-size: 16px; font-weight: 700; margin-top: 2px; color: #2980b9;">100%</div>
            </div>

            <div style="background: rgba(231, 76, 60, 0.08); border: 1px solid rgba(231, 76, 60, 0.2); padding: 10px; border-radius: 8px; text-align: center;">
                <div style="font-size: 10px; font-weight: 700; color: #c0392b; text-transform: uppercase;">Daily Burn Rate</div>
                <div id="burn-rate" style="font-size: 16px; font-weight: 700; margin-top: 2px; color: #c0392b;">$0.00/day</div>
            </div>
        </div>

        <form id="tracker-form" style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;">
            <div>
                <label style="font-weight: 700; font-size: 11px; display: block; margin-bottom: 4px; letter-spacing: 0.3px;">ITEM DESCRIPTION</label>
                <input type="text" id="desc" oninput="autoUpdatePrice()" placeholder="e.g., Pizza, Burger, Salary" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; box-sizing: border-box;" required>
            </div>
            
            <div style="display: flex; gap: 10px; width: 100%;">
                <div style="flex: 1;">
                    <label style="font-weight: 700; font-size: 11px; display: block; margin-bottom: 4px; letter-spacing: 0.3px;">PRICE / VALUE</label>
                    <input type="text" id="amount" placeholder="Price" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; box-sizing: border-box;" required>
                </div>
                <div style="width: 110px;">
                    <label style="font-weight: 700; font-size: 11px; display: block; margin-bottom: 4px; letter-spacing: 0.3px;">SIZE VARIANT</label>
                    <select id="item-size" onchange="autoUpdatePrice()" style="width: 100%; padding: 10px 4px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; box-sizing: border-box; background-color: #fff; font-weight: 600; color: #333;">
                        <option value="SMALL">SMALL 🟢</option>
                        <option value="MEDIUM" selected>MEDIUM 🟡</option>
                        <option value="LARGE">LARGE 🔴</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 10px; width: 100%;">
                <div style="flex: 1;">
                    <label style="font-weight: 700; font-size: 11px; display: block; margin-bottom: 4px;">TIMELINE MONTH</label>
                    <select id="timeline-month" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background-color: #fff; font-weight: 600; color: #333;">
                        <option value="0">January (Jan)</option>
                        <option value="1">February (Feb)</option>
                        <option value="2">March (Mar)</option>
                        <option value="3">April (Apr)</option>
                        <option value="4">May (May)</option>
                        <option value="5">June (Jun)</option>
                        <option value="6" selected>July (Jul)</option>
                        <option value="7">August (Aug)</option>
                        <option value="8">September (Sep)</option>
                        <option value="9">October (Oct)</option>
                        <option value="10">November (Nov)</option>
                        <option value="11">December (Dec)</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: 700; font-size: 11px; display: block; margin-bottom: 4px;">TIME PERIOD</label>
                    <select id="timeline-period" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; background-color: #fff; font-weight: 600; color: #333;">
                        <option value="Morning">🌅 Morning (6AM-12PM)</option>
                        <option value="Afternoon">☀️ Afternoon (12PM-5PM)</option>
                        <option value="Evening">🌆 Evening (5PM-9PM)</option>
                        <option value="Night">🌙 Night (9PM-6AM)</option>
                    </select>
                </div>
            </div>
            
            <div id="category-box-divider" style="padding-bottom: 16px; border-bottom: 1px solid #dcdde1;">
                <label style="font-weight: 700; font-size: 11px; display: block; margin-bottom: 4px; letter-spacing: 0.3px;">TRANSACTION CATEGORY</label>
                <select id="category" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; box-sizing: border-box; background-color: #fff; font-weight: 600; color: #333;">
                    <option value="Food">FOOD 🍔</option>
                    <option value="Clothes">CLOTHES 👑</option>
                    <option value="Electronics">ELECTRONICS ⚡</option>
                    <option value="Salary">DEPOSIT CASH 💰</option>
                    <option value="General">OTHER ⚪</option>
                </select>
            </div>
            
            <button type="submit" id="form-submit-btn" style="background: #e74c3c; width: 100%; height: 42px; border: none; border-radius: 6px; cursor: pointer; transition: background 0.2s; color: white; font-weight: 700; font-size: 13px; letter-spacing: 0.3px; text-transform: uppercase;">SUBTRACT TRANSACTION</button>
        </form>

        <div style="margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.02); border-radius: 10px; border: 1px solid rgba(0,0,0,0.05);">
            <div style="font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; text-align: center;">📊 12-Month Contribution Map</div>
            <div id="year-contribution-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; text-align: center;">
                </div>
        </div>

        <div style="margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.02); border-radius: 10px; border: 1px solid rgba(0,0,0,0.05);">
            <div style="font-size: 11px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; text-align: center;">⏰ Diurnal Money Burn Heat Map</div>
            <div id="diurnal-heatmap-grid" style="display: flex; flex-direction: column; gap: 6px;">
                </div>
        </div>
    </div>

    <div id="history-sidebar" style="position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: #fff; box-shadow: -4px 0 15px rgba(0,0,0,0.12); transition: right 0.25s ease; z-index: 9999; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; border-left: 1px solid #dcdde1;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e1b12c; padding-bottom: 10px; margin-bottom: 12px;">
            <h3 id="sidebar-title" style="margin: 0; font-size: 12px; font-weight: 700; color: inherit; letter-spacing: 0.3px;">VERIFIED LOG HISTORY</h3>
            <button type="button" onclick="toggleSidebar(false)" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #999;">✕</button>
        </div>
        <div style="flex: 1; overflow-y: auto;">
            <ul id="list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
